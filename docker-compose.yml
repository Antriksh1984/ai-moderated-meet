version: "3.8"

services:
  server:
    build: ./server
    container_name: webrtc-server
    ports:
      - "3001:3001"

  client:
    build:
      context: ./client
      args:
        REACT_APP_API_URL: http://server:3001
    container_name: webrtc-client
    ports:
      - "3000:80"
    depends_on:
      - server